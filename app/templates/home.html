{% extends "base.html" %} {% block title %}Home{% endblock %}

{% block content %}
<header>
    <h1>Pattern Finder</h1>
    <button type="button" id="admin-login" style="position: absolute; right: 0; top: 16px;">Admin Login</button>
    <h2 style="font-size:40px;">Developer Home</h2>
</header>

<main>
    <section style="position: absolute; top: 208px;">
        <h2>Ask Design Problem</h2>

        <form id="design-problem-form" onsubmit = "submitDesignProblemScript(event)">
            <label for="design-problem">Enter a design problem: </label>
            <br />
            <textarea name="problem" id="design-problem" rows="10" cols="50"
                placeholder="Design problem description."></textarea>

            <br />
            <label for="collection-select">Choose a design pattern collection: </label>
            <select name="" id="collection-select">
                <option value="0">--Please choose an option--</option>
                <option value="1">All</option>
                <option value="2">Gang of Four</option>
                
            </select>

            <br />
            <label for="library-select">Choose a digital library source: </label>
            <select name="" id="library-select">
                <option value="0">All</option>                    
            </select>

            <br />
            <button type="submit">Submit</button>
        </form>            

    </section>        

    <section style="position: absolute; top: 208px; right: 384px;">
        <h2>Recommended Design Patterns</h2>            

        <ul id="pattern-list" style="overflow-y: scroll;">
        </ul>

    </section>

</main>
{% endblock %}
